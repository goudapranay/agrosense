name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true
      - name: Inject backend URL
        run: |
          URL="${{ secrets.RENDER_BACKEND_URL }}"
          if [ -n "$URL" ]; then
            sed -i "s|http://10.0.2.2:8000|$URL|g" app/lib/services/api_service.dart
          fi
      - run: flutter pub get
        working-directory: app
      - run: flutter clean
        working-directory: app
      - run: flutter build apk --release --build-number=${{ github.run_number }}
        working-directory: app
      - name: Rename APK
        run: cp app/build/app/outputs/flutter-apk/app-release.apk agrosense-v2.0.${{ github.run_number }}.apk
      - uses: actions/upload-artifact@v4
        with:
          name: AgroSense-v2-APK
          path: agrosense-v2.0.${{ github.run_number }}.apk
          retention-days: 30
