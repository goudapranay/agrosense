services:
  - type: web
    name: agrosense-api
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEE_PROJECT
        sync: false
      - key: GEE_SERVICE_ACCOUNT_JSON
        sync: false